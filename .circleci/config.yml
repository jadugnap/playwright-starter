version: 2.1

orbs:
  python: circleci/python@2.1.1

jobs:
  run-tests:
    docker:
      - image: cimg/python:3.11-node
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
      - run:
          name: Install Playwright Browsers and System Dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            # Install chromium browser along with required system OS dependencies
            playwright install --with-deps chromium
      - run:
          name: Run Behave BDD Tests
          command: |
            # Run behave tests; screenshots are captured automatically on failure
            behave
      - store_artifacts:
          path: screenshots
          destination: failure-screenshots

workflows:
  test-workflow:
    jobs:
      - run-tests
